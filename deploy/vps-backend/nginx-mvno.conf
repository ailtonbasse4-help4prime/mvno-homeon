server {
    listen 80;
    server_name mvno.homeonapp.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mvno.homeonapp.com.br;

    # SSL (Certbot)
    ssl_certificate /etc/letsencrypt/live/mvno.homeonapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mvno.homeonapp.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Raiz do frontend React
    root /var/www/mvno/frontend;
    index index.html;

    # ===== BACKEND NODE (rota de ativacao existente) =====
    # IMPORTANTE: Ajuste a porta 3001 se seu Node roda em outra porta
    location = /ativar-chip {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== BACKEND FASTAPI (todas as rotas /api/) =====
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # ===== WEBHOOKS ASAAS =====
    location /webhooks/ {
        proxy_pass http://127.0.0.1:8001/api/webhooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== FRONTEND REACT (SPA) =====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
